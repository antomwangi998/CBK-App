name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python 3.10
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    # 3. Install dependencies
    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-venv openjdk-11-jdk zip unzip git wget curl \
        autoconf automake build-essential libtool pkg-config zlib1g-dev

    # 4. Upgrade pip and install Python packages
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    # 5. Build the APK
    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    # 6. Upload the APK as artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CBK-APK
        path: bin/*.apk
