name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3. Install system dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk unzip git wget curl build-essential

      # 4. Upgrade pip and install buildozer & cython
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      # 5. Initialize Android SDK/NDK (needed for Buildozer)
      - name: Install Android SDK & NDK
        run: |
          buildozer android sdk

      # 6. Build the APK
      - name: Build APK
        run: |
          buildozer android debug

      # 7. Upload the APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-debug-apk
          path: bin/*.apk
