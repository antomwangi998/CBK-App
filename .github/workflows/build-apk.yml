
name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3. Install system dependencies for Buildozer
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev git unzip zip \
            openjdk-17-jdk build-essential autoconf automake libtool \
            zlib1g-dev libc6-dev libncurses5-dev libstdc++6 \
            libffi-dev libssl-dev libsqlite3-dev

      # 4. Upgrade pip and install Buildozer + Cython
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython

      # 5. Initialize Buildozer and build APK
      - name: Build APK
        run: |
          buildozer android debug

      # 6. Upload the APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-APK
          path: bin/*.apk
