name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip wget git python3 python3-pip \
            libncurses5 libstdc++6 libz1

      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython virtualenv

      - name: Install Android SDK tools (pinned)
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O tools.zip
          unzip -q tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

      - name: Accept Android licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses

      - name: Install Android SDK packages (pinned)
        run: |
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-30" \
            "build-tools;30.0.3" \
            "ndk;23.1.7779620"

      - name: Force Buildozer SDK path
        run: |
          sed -i 's|# android.sdk_path = .*|android.sdk_path = '"$HOME"'/android-sdk|g' buildozer.spec
          sed -i 's|# android.ndk_path = .*|android.ndk_path = '"$HOME"'/android-sdk/ndk/23.1.7779620|g' buildozer.spec

      - name: Verify AIDL exists
        run: |
          ls -la $HOME/android-sdk/build-tools/30.0.3/
          $HOME/android-sdk/build-tools/30.0.3/aidl version

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-APK
          path: bin/*.apk
