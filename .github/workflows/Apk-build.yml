name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. Install essential tools
    - name: Install essentials
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev build-essential git wget curl unzip tar openjdk-17-jdk libncurses5 libncurses5-dev

    # 2. Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 3. Setup Python environment
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    # 4. Install Buildozer and dependencies
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 5. Install Android SDK tools
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $HOME/android-sdk
        mkdir -p $HOME/android-sdk/cmdline-tools/latest
        mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # 6. Build the APK
    - name: Build APK
      run: |
        buildozer android debug
        ls -lh bin/

    # 7. Upload APK as artifact
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: cbk-apk
        path: bin/*.apk
