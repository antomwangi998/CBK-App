name: Build CBK APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python 3.10
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install system dependencies for Buildozer
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-setuptools python3-wheel \
          build-essential libffi-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libsqlite3-dev \
          libreadline-dev libbz2-dev liblzma-dev git wget unzip openjdk-17-jdk curl

    # 4. Upgrade pip, setuptools, wheel, and install Buildozer & Cython
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install buildozer cython

    # 5. Download Android command-line tools and accept licenses
    - name: Install Android SDK & Accept Licenses
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/bin:$PATH
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # 6. Build the APK using Buildozer
    - name: Build APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/bin:$PATH
        buildozer android debug

    # 7. Upload APK as artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CBK-debug-apk
        path: bin/*.apk
