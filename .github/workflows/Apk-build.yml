name: Build CBK APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip build-essential \
            libffi-dev libssl-dev zlib1g-dev libncurses5-dev libncursesw5-dev \
            libsqlite3-dev libreadline-dev libbz2-dev liblzma-dev curl openjdk-17-jdk
          python3 -m pip install --upgrade pip setuptools wheel cython buildozer

      # 5. Accept Android SDK licenses automatically
      - name: Accept Android SDK licenses
        run: |
          yes | buildozer android sdk --accept-licenses || true

      # 6. Build the APK
      - name: Build APK
        run: buildozer android debug

      # 7. Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-debug-apk
          path: bin/*.apk
