name: Build CBK APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Setup Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Install system dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip build-essential \
            libffi-dev libssl-dev zlib1g-dev libncurses5-dev libncursesw5-dev \
            libsqlite3-dev libreadline-dev libbz2-dev liblzma-dev curl openjdk-17-jdk
          python3 -m pip install --upgrade pip setuptools wheel cython buildozer

      # 5. Install Android SDK cmdline-tools & accept licenses
      - name: Install Android SDK and accept licenses
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          rm cmdline-tools.zip
          mkdir -p $HOME/.android
          echo "### Automatically accept all SDK licenses ###"
          yes | $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses

      # 6. Install specific build-tools & platform
      - name: Install Build-Tools & Platform
        run: |
          $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      # 7. Build the APK
      - name: Build APK
        run: |
          buildozer android debug

      # 8. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-debug-apk
          path: bin/*.apk
