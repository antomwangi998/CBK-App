name: Build CBK APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev build-essential git unzip openjdk-17-jdk \
          libncurses5 libncurses5-dev zlib1g-dev libffi-dev libssl-dev wget curl

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          pip install cython==0.29.36 buildozer==1.4.2

      - name: Setup Android SDK command line tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          rm cmdline-tools.zip
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Initialize Buildozer
        run: |
          buildozer android clean
          buildozer android debug
