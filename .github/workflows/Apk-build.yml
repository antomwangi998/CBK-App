name: Build CBK APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # 1️⃣ Checkout repo (avoids tar errors)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Python 3.11 (latest supported)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install system dependencies (Buildozer & Android SDK dependencies)
      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-setuptools python3-virtualenv \
            build-essential git zip unzip wget openjdk-17-jdk tar

      # 4️⃣ Setup Java 17 for SDK
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 5️⃣ Install Buildozer and dependencies
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython buildozer

      # 6️⃣ Accept all Android SDK licenses
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT
          mv $ANDROID_SDK_ROOT/cmdline-tools $ANDROID_SDK_ROOT/latest
          yes | $ANDROID_SDK_ROOT/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      # 7️⃣ Build APK with Buildozer
      - name: Build APK
        run: |
          buildozer android debug

      # 8️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CBK-App-debug-apk
          path: bin/*.apk
