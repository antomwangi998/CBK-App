name: Build CBK APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk

    steps:
    # 1. Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java (JDK 17 for latest Build Tools compatibility)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: 17

    # 3. Install essential packages
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip git unzip wget zip libncurses5 libncurses5-dev

    # 4. Install Buildozer and Cython
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 5. Install Android SDK command line tools
    - name: Install Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip
        rm cmdline-tools.zip
        mv cmdline-tools latest
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # 6. Build APK using Buildozer
    - name: Build APK
      run: |
        buildozer android debug

    # 7. Upload APK artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CBK-APK
        path: bin/*.apk
